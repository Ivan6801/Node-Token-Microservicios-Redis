services:
  api:
    build:
      context: .
    container_name: node-token-api
    environment:
      API_PORT: 3001
      REMOTE_DB: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_DATABASE: node_tokens
      MYSQL_SRV_HOST: mysql-service
      MYSQL_SRV_PORT: 3003
      JWT_SECRET: notasecret!
      JWT_EXPIRES_IN: 2h
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql-service:
    build:
      context: .
    container_name: node-token-mysql-service
    command: ["node", "mysql/index.js"]
    environment:
      MYSQL_SRV_PORT: 3003
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_DATABASE: node_tokens
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  post-service:
    build:
      context: .
    container_name: node-token-post-service
    command: ["node", "post/index.js"]
    environment:
      POST_PORT: 3002
      REMOTE_DB: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_DATABASE: node_tokens
      MYSQL_SRV_HOST: mysql-service
      MYSQL_SRV_PORT: 3003
      JWT_SECRET: notasecret!
      JWT_EXPIRES_IN: 2h
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: node-token-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: node_tokens
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
